version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: streamin-db
    restart: always
    environment:
      POSTGRES_USER: streamin_user
      POSTGRES_PASSWORD: streamin_secure_password
      POSTGRES_DB: streamin_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: streamin-cache
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  backend:
    build:
      context: ./backend
      dockerfile: ../Dockerfile.backend
    container_name: streamin-api
    restart: always
    environment:
      - DATABASE_URL=postgresql://streamin_user:streamin_secure_password@postgres:5432/streamin_db?schema=public
      - REDIS_URL=redis://redis:6379
      - PORT=5000
      - JWT_SECRET=super_secret_jwt_sign_key_streamin_ai_2026
      - OPENAI_API_KEY=mock-key-for-transcribing-and-chatting
      - CLOUDINARY_URL=cloudinary://mock-url
    ports:
      - "5000:5000"
    depends_on:
      - postgres
      - redis

  frontend:
    build:
      context: ./frontend
      dockerfile: ../Dockerfile.frontend
    container_name: streamin-web
    restart: always
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:5000
    ports:
      - "3000:3000"
    depends_on:
      - backend

  nginx:
    image: nginx:alpine
    container_name: streamin-nginx
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
      - frontend

volumes:
  postgres_data:
  redis_data:
